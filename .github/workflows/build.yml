name: Build CS 1.6 Cheat

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # إضافة خطوة لعرض تكوينات الحل المتاحة للتأكد من الأسماء الصحيحة
    - name: List solution configurations
      run: |
        msbuild CS16Ext.sln /validate

    # محاولة البناء بدون تحديد Configuration أو Platform لاستخدام الافتراضي
    - name: Build with MSBuild
      run: |
        msbuild CS16Ext.sln /t:Build /p:Configuration=Debug /p:Platform="Win32"
