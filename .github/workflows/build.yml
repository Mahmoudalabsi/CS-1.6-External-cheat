name: Build CS 1.6 Cheat

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install DirectX Dependencies
        run: nuget install DirectXSDK -Version 9.29.1962 -OutputDirectory dependencies

      - name: Build Cheat
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object -First 1
          # نمرر مسار الـ include الخاص بالمكتبة التي حملناها للـ MSBuild
          $includePath = (Get-ChildItem -Path dependencies -Filter Include -Recurse | Select-Object -First 1).FullName
          msbuild $sln.FullName /p:IncludePath="$includePath" /m
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS16-Cheat-Binary
          path: |
            **/*.exe
            **/*.dll
