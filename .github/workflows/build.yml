name: Build CS 1.6 Cheat

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Install D3DX NuGet package
      run: nuget install Microsoft.DXSDK.D3DX -OutputDirectory packages

    - name: Configure D3DX paths
      shell: pwsh
      run: |
        $workspace = $env:GITHUB_WORKSPACE
        $pkgPath = Join-Path $workspace 'packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native'

        Write-Host "d3dx9.h exists: $(Test-Path (Join-Path $pkgPath 'include\d3dx9.h'))"
        Write-Host "d3dx9.lib exists: $(Test-Path (Join-Path $pkgPath 'release\lib\x86\d3dx9.lib'))"

        echo "DXSDK_DIR=$pkgPath\" >> $env:GITHUB_ENV
        Write-Host "DXSDK_DIR=$pkgPath\"

        $targetsPath = Join-Path $workspace 'Directory.Build.targets'
        $xml = '<Project>'
        $xml += '<ItemDefinitionGroup>'
        $xml += '<Link>'
        $xml += "<AdditionalLibraryDirectories>$pkgPath\release\lib\x86;$pkgPath\debug\lib\x86;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>"
        $xml += '</Link>'
        $xml += '</ItemDefinitionGroup>'
        $xml += '</Project>'
        Set-Content -Path $targetsPath -Value $xml
        Write-Host 'Created Directory.Build.targets:'
        Get-Content $targetsPath

    - name: Build Release Win32 (Static CRT)
      run: msbuild CS16Ext.sln /t:Build /p:Configuration=Release /p:Platform="Win32" /p:RuntimeLibrary=MultiThreaded

    - name: Build Debug Win32 (Static CRT)
      run: msbuild CS16Ext.sln /t:Build /p:Configuration=Debug /p:Platform="Win32" /p:RuntimeLibrary=MultiThreadedDebug

    - name: Copy runtime DLLs
      shell: pwsh
      run: |
        $workspace = $env:GITHUB_WORKSPACE
        $pkgPath = Join-Path $workspace 'packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native'

        $releaseBin = Join-Path $pkgPath 'release\bin\x86'
        $releaseOut = Join-Path $workspace 'CS16Ext\Release'
        Copy-Item (Join-Path $releaseBin 'D3DX9_43.dll') $releaseOut -Force
        Copy-Item (Join-Path $releaseBin 'D3DCompiler_43.dll') $releaseOut -Force
        Write-Host 'Release output:'
        Get-ChildItem $releaseOut

        $debugBin = Join-Path $pkgPath 'debug\bin\x86'
        $debugOut = Join-Path $workspace 'CS16Ext\Debug'
        Copy-Item (Join-Path $debugBin 'D3dx9d_43.dll') $debugOut -Force
        Copy-Item (Join-Path $debugBin 'D3DCompiler_43.dll') $debugOut -Force
        Write-Host 'Debug output:'
        Get-ChildItem $debugOut

    - name: Upload Release Build
      uses: actions/upload-artifact@v4
      with:
        name: CS16Ext-Release-Win32
        path: CS16Ext/Release/
        if-no-files-found: warn

    - name: Upload Debug Build
      uses: actions/upload-artifact@v4
      with:
        name: CS16Ext-Debug-Win32
        path: CS16Ext/Debug/
        if-no-files-found: warn
