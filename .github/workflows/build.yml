name: Build CS 1.6 Cheat

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Install D3DX NuGet package
      run: nuget install Microsoft.DXSDK.D3DX -OutputDirectory packages

    - name: Configure D3DX include and lib paths
      shell: pwsh
      run: |
        $workspace = $env:GITHUB_WORKSPACE
        $pkgPath = Join-Path $workspace "packages\Microsoft.DXSDK.D3DX.9.29.952.8\build\native"

        # Verify key files exist
        $d3dx9h = Join-Path $pkgPath "include\d3dx9.h"
        $d3dx9lib = Join-Path $pkgPath "release\lib\x86\d3dx9.lib"
        $d3dx9dlib = Join-Path $pkgPath "debug\lib\x86\d3dx9d.lib"
        Write-Host "d3dx9.h exists: $(Test-Path $d3dx9h)"
        Write-Host "d3dx9.lib (release) exists: $(Test-Path $d3dx9lib)"
        Write-Host "d3dx9d.lib (debug) exists: $(Test-Path $d3dx9dlib)"

        # Set DXSDK_DIR with trailing backslash
        # The vcxproj uses $(DXSDK_DIR)Include which resolves to ...\build\native\Include
        $dxsdkDir = $pkgPath + "\"
        echo "DXSDK_DIR=$dxsdkDir" >> $env:GITHUB_ENV
        Write-Host "DXSDK_DIR = $dxsdkDir"

        # Create Directory.Build.targets to add the CORRECT lib paths
        # The NuGet package structure is: build/native/{debug|release}/lib/{x86|x64}/
        # But the vcxproj expects: $(DXSDK_DIR)/Lib/x86 which doesn't exist
        # So we add both release and debug lib paths here
        $targetsContent = @"
<Project>
  <ItemDefinitionGroup>
    <Link>
      <AdditionalLibraryDirectories>$pkgPath\release\lib\x86;$pkgPath\debug\lib\x86;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
    </Link>
  </ItemDefinitionGroup>
</Project>
"@
        [System.IO.File]::WriteAllText("$workspace\Directory.Build.targets", $targetsContent)
        Write-Host "Created Directory.Build.targets:"
        Get-Content "$workspace\Directory.Build.targets"

    - name: Build Debug Win32
      run: msbuild CS16Ext.sln /t:Build /p:Configuration=Debug /p:Platform="Win32"

    - name: Build Release Win32
      run: msbuild CS16Ext.sln /t:Build /p:Configuration=Release /p:Platform="Win32"

    - name: Upload Debug Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CS16Ext-Debug-Win32
        path: CS16Ext/Debug/CS16.exe
        if-no-files-found: warn

    - name: Upload Release Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CS16Ext-Release-Win32
        path: CS16Ext/Release/CS16.exe
        if-no-files-found: warn
