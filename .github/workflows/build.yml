name: Build CS 1.6 Cheat

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Cheat
        run: |
          # البحث عن أي ملف مشروع (sln) أو بناء مباشر
          $sln = Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object -First 1
          if ($sln) {
            msbuild $sln.FullName /p:Configuration=Release /p:Platform="x86"
          } else {
            # إذا لم يوجد ملف sln، نستخدم مترجم cl مباشرة للملفات الأساسية
            cl /EHsc /O2 /Fe:CS16Cheat.exe *.cpp user32.lib
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS16-Cheat-Binary
          path: |
            **/*.exe
