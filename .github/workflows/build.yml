name: Build CS 1.6 Cheat

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Install DirectX D3DX SDK via NuGet
      run: |
        nuget install Microsoft.DXSDK.D3DX -OutputDirectory packages

    - name: Set DXSDK_DIR environment variable
      shell: pwsh
      run: |
        $pkgDir = Get-ChildItem -Path "packages\Microsoft.DXSDK.D3DX.*" -Directory | Select-Object -First 1
        $dxsdkDir = Join-Path $pkgDir.FullName "build\native"
        # DXSDK_DIR must end with backslash because vcxproj uses $(DXSDK_DIR)Include (no separator)
        $dxsdkDirWithSlash = $dxsdkDir + "\"
        Write-Host "DXSDK_DIR = $dxsdkDirWithSlash"

        # Verify paths
        Write-Host "Include exists: $(Test-Path (Join-Path $dxsdkDir 'include'))"
        Write-Host "d3dx9.h exists: $(Test-Path (Join-Path $dxsdkDir 'include\d3dx9.h'))"
        Write-Host "Lib x86 exists: $(Test-Path (Join-Path $dxsdkDir 'lib\x86'))"
        Write-Host "d3dx9.lib exists: $(Test-Path (Join-Path $dxsdkDir 'lib\x86\d3dx9.lib'))"

        # List lib directory contents
        $libDir = Join-Path $dxsdkDir "lib"
        if (Test-Path $libDir) {
          Write-Host "Contents of lib directory:"
          Get-ChildItem $libDir -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
        }

        echo "DXSDK_DIR=$dxsdkDirWithSlash" >> $env:GITHUB_ENV

    - name: Build Debug Win32
      shell: pwsh
      run: |
        $pkgDir = Get-ChildItem -Path "packages\Microsoft.DXSDK.D3DX.*" -Directory | Select-Object -First 1
        $dxsdkDir = Join-Path $pkgDir.FullName "build\native"
        $includePath = Join-Path $dxsdkDir "include"
        $libPath = Join-Path $dxsdkDir "lib\x86"

        msbuild CS16Ext.sln /t:Build /p:Configuration=Debug /p:Platform="Win32" `
          /p:AdditionalIncludeDirectories="$includePath;%(AdditionalIncludeDirectories)" `
          /p:AdditionalLibraryPaths="$libPath;%(AdditionalLibraryPaths)"

    - name: Build Release Win32
      shell: pwsh
      run: |
        $pkgDir = Get-ChildItem -Path "packages\Microsoft.DXSDK.D3DX.*" -Directory | Select-Object -First 1
        $dxsdkDir = Join-Path $pkgDir.FullName "build\native"
        $includePath = Join-Path $dxsdkDir "include"
        $libPath = Join-Path $dxsdkDir "lib\x86"

        msbuild CS16Ext.sln /t:Build /p:Configuration=Release /p:Platform="Win32" `
          /p:AdditionalIncludeDirectories="$includePath;%(AdditionalIncludeDirectories)" `
          /p:AdditionalLibraryPaths="$libPath;%(AdditionalLibraryPaths)"

    - name: Upload Debug Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CS16Ext-Debug-Win32
        path: CS16Ext/Debug/CS16.exe
        if-no-files-found: warn

    - name: Upload Release Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CS16Ext-Release-Win32
        path: CS16Ext/Release/CS16.exe
        if-no-files-found: warn
