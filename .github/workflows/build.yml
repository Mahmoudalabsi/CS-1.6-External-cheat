name: Build CS 1.6 Cheat

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Download Missing Headers
        shell: pwsh
        run: |
          # إنشاء مجلد للمكتبات الناقصة
          mkdir DX9Headers
          # تحميل الملفات الأساسية المفقودة
          $files = @("d3dx9.h", "d3dx9math.h", "d3dx9core.h", "d3dx9tex.h", "d3d9.h", "d3d9types.h", "d3d9caps.h")
          foreach ($file in $files) {
            Write-Host "Downloading $file..."
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/microsoft/directx-sdk-samples/master/Include/$file" -OutFile "DX9Headers/$file"
          }

      - name: Build Cheat
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object -First 1
          # إضافة مجلد الـ Headers الذي أنشأناه إلى مسار التضمين
          $includePath = Join-Path $PWD "DX9Headers"
          msbuild $sln.FullName /p:IncludePath="$includePath" /m

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS16-Cheat-Binary
          path: |
            **/*.exe
            **/*.dll
